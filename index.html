<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hasan Temp Mail Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background: #050505; color: #fff; font-family: 'Poppins', sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding-top: 20px;
        }
        .container { 
            width: 95%; max-width: 420px; background: #111; padding: 25px 20px; 
            border-radius: 20px; border: 1px solid #333; text-align: center;
        }
        .banner { 
            font-size: 2rem; font-weight: 800; margin-bottom: 5px;
            background: linear-gradient(to right, #bf953f, #ffd700);
            -webkit-background-clip: text; color: transparent; text-transform: uppercase;
        }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444;
            background: #000; color: #ffd700; text-align: center; font-size: 1rem; 
            box-sizing: border-box; margin-bottom: 15px; font-weight: 600;
        }
        
        .btn-premium { 
            background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; font-weight: 800;
            padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%;
            margin-bottom: 15px; font-size: 1rem; text-transform: uppercase;
        }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-small { 
            flex: 1; background: #222; color: #fff; padding: 12px; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid #444;
        }
        
        .inbox-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .inbox-title { color: #ffd700; font-size: 1.1rem; font-weight: 600; margin: 0; }
        
        #messages { text-align: left; max-height: 400px; overflow-y: auto; }
        
        .mail-item { 
            background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; 
            border-left: 4px solid #ffd700; word-wrap: break-word;
        }
        .mail-sender { color: #ffd700; font-size: 0.85rem; margin-bottom: 5px; font-weight: 600; }
        .mail-subject { font-weight: 800; margin-bottom: 10px; font-size: 1rem; }
        .mail-body { background: #000; padding: 10px; border-radius: 5px; font-size: 0.9rem; color: #ccc; white-space: pre-wrap; font-family: monospace;}
        
        .status-text { color: #666; text-align: center; font-size: 0.9rem; margin-top: 20px;}
        .loading { display: none; color: #ffd700; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">Hasan Gmail</div>
    <div class="subtitle">Bypass FB Verification Easily</div>
    
    <button class="btn-premium" id="genBtn" onclick="createAccount()">🚀 GENERATE NEW MAIL</button>
    <div id="loadingText" class="loading">Creating account... Please wait...</div>
    
    <input type="text" id="emailDisplay" readonly placeholder="Your Email Will Appear Here">
    
    <div class="btn-group">
        <button class="btn-small" onclick="checkInboxManually()">🔄 REFRESH INBOX</button>
        <button class="btn-small" onclick="copyMail()">📋 COPY MAIL</button>
    </div>
    
    <div class="inbox-header">
        <h3 class="inbox-title">📥 Live Inbox</h3>
    </div>
    
    <div id="messages">
        <div class="status-text" id="statusMsg">Waiting for you to generate an email...</div>
    </div>
</div>

<script>
    let token = "";
    let email = "";
    let lastMessageId = ""; // যেন একই মেসেজ বারবার লোড না হয়

    // ১. অ্যাকাউন্ট এবং টোকেন তৈরি করা
    async function createAccount() {
        const btn = document.getElementById('genBtn');
        const loading = document.getElementById('loadingText');
        
        btn.disabled = true;
        loading.style.display = 'block';
        document.getElementById('statusMsg').innerText = "Connecting to server...";

        try {
            // ডোমেইন নেওয়া
            const dRes = await fetch('https://api.mail.tm/domains');
            const dData = await dRes.json();
            const domain = dData['hydra:member'][0].domain;
            
            email = "fb_" + Math.random().toString(36).substring(2, 10) + "@" + domain;
            const password = "HasanSecretPass123!";
            
            // অ্যাকাউন্ট তৈরি
            await fetch('https://api.mail.tm/accounts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: email, password: password})
            });

            // টোকেন নেওয়া
            const tRes = await fetch('https://api.mail.tm/token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: email, password: password})
            });
            
            const tData = await tRes.json();
            token = tData.token;
            
            document.getElementById('emailDisplay').value = email;
            document.getElementById('statusMsg').innerText = "Inbox active. Waiting for OTP...";
            document.getElementById('messages').innerHTML = ''; // ইনবক্স ক্লিয়ার
            lastMessageId = "";
            
        } catch (error) {
            alert("Error creating email. Please try again.");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    // ২. মেসেজ লিস্ট চেক করা এবং নতুন মেসেজ বডি রিড করা
    async function checkInbox() {
        if (!token) return;

        try {
            // মেসেজ লিস্ট কল করা
            const res = await fetch('https://api.mail.tm/messages', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            // যদি ইনবক্সে মেসেজ থাকে
            if (data['hydra:totalItems'] > 0) {
                const latestMsg = data['hydra:member'][0];
                
                // নতুন মেসেজ হলেই কেবল বডি রিড করবে (এতে স্পিড বাড়বে)
                if (latestMsg.id !== lastMessageId) {
                    lastMessageId = latestMsg.id;
                    
                    // মেসেজের ফুল বডি (টেক্সট/কোড) পড়ার জন্য কল
                    const msgDetailRes = await fetch(`https://api.mail.tm/messages/${latestMsg.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const msgDetail = await msgDetailRes.json();
                    
                    // স্ক্রিনে দেখানো
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'mail-item';
                    
                    // text না থাকলে html দেখাবে
                    const bodyContent = msgDetail.text || "No text body found. Check html.";
                    
                    msgDiv.innerHTML = `
                        <div class="mail-sender">From: ${latestMsg.from.address}</div>
                        <div class="mail-subject">Subject: ${latestMsg.subject}</div>
                        <div class="mail-body">${bodyContent}</div>
                    `;
                    
                    const messagesContainer = document.getElementById('messages');
                    // প্রথম মেসেজ হলে statusMsg সরিয়ে ফেলা
                    if(document.getElementById('statusMsg')) {
                        messagesContainer.innerHTML = '';
                    }
                    // নতুন মেসেজ সবার উপরে যোগ করা
                    messagesContainer.prepend(msgDiv);
                }
            }
        } catch (error) {
            console.error("Error checking inbox:", error);
        }
    }

    function checkInboxManually() {
        if (!token) {
            alert("Please generate an email first!");
            return;
        }
        checkInbox();
    }

    function copyMail() {
        const emailField = document.getElementById("emailDisplay");
        if (!emailField.value) {
            alert("Nothing to copy!");
            return;
        }
        emailField.select();
        document.execCommand("copy");
        alert("Email copied!");
    }

    // প্রতি ৪ সেকেন্ডে অটো রিফ্রেশ
    setInterval(checkInbox, 4000);
</script>

</body>
</html>
