<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>HASAN PRO MAIL · Premium Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #050505; min-height: 100vh; padding: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .container { width: 100%; max-width: 1000px; margin: 0 auto; background: #111; border-radius: 2rem; border: 1px solid #333; box-shadow: 0 30px 50px rgba(0,0,0,0.6); overflow: hidden; }
    
    /* প্রিমিয়াম ব্যানার স্টাইল */
    .header { padding: 30px 24px; border-bottom: 2px solid #FFD700; background: linear-gradient(135deg, #0f172a, #1e293b); text-align: center; }
    h1 { font-size: 2rem; font-weight: 800; color: #FFD700; display: flex; align-items: center; justify-content: center; gap: 12px; text-transform: uppercase; }
    .sub { color: #aaa; font-size: 0.8rem; margin-top: 8px; letter-spacing: 1px; }

    .email-card { margin: 20px 20px 16px 20px; background: #000; border-radius: 1.5rem; border: 1px solid #333; }
    .email-label { display: flex; align-items: center; gap: 10px; padding: 12px 18px 0 18px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: #FFD700; }
    .email-input-area { display: flex; align-items: center; gap: 12px; padding: 8px 18px 18px 18px; flex-wrap: wrap; }
    #email { flex: 1; background: #111; border: 1px solid #444; border-radius: 1.2rem; padding: 14px 18px; color: #FFD700; font-size: 0.9rem; font-weight: 600; outline: none; width: 100%; }
    
    .btn-modern { background: #222; border: 1px solid #444; padding: 12px 20px; border-radius: 12px; color: white; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: linear-gradient(45deg, #FFD700, #B8860B); color: #000; font-weight: 800; border: none; }
    .action-group { display: flex; gap: 12px; margin: 0px 20px 22px 20px; }
    
    .domain-selector { margin: 0 20px 15px 20px; display: flex; gap: 10px; align-items: center; background: #1a1a1a; padding: 10px 15px; border-radius: 2rem; border: 1px solid #333; }
    .mail-card { background: #1a1a1a; border-radius: 1.25rem; padding: 1rem 1.2rem; margin-bottom: 10px; border-left: 4px solid #FFD700; cursor: pointer; }
    .badge-count { background: #FFD700; color: #000; padding: 2px 10px; border-radius: 40px; }
    
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #FFD700; color: #000; padding: 10px 25px; border-radius: 40px; font-weight: bold; z-index: 9999; }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-crown"></i> HASAN PRO MAIL</h1>
    <div class="sub">PREMIUM PRIVATE INBOX · SECURED FOR YOU</div>
  </div>

  <div class="email-card">
    <div class="email-label"><i class="fas fa-at"></i> <span>Disposable Address</span></div>
    <div class="email-input-area">
      <input type="text" id="email" readonly placeholder="Generate new email">
      <button class="btn-modern" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
    </div>
  </div>

  <div class="domain-selector">
    <span style="font-size: 0.7rem; color: #aaa;">Provider: <b id="activeProviderLabel">Guerrilla</b></span>
    <button id="switchProviderBtn" style="background:#000; border:1px solid #555; color:#fff; border-radius:20px; padding:4px 10px; cursor:pointer; font-size:0.7rem;">Switch</button>
  </div>

  <div class="action-group">
    <button class="btn-modern btn-primary" id="generateBtn"><i class="fas fa-magic"></i> Generate New Mail</button>
    <button class="btn-modern" id="refreshBtn"><i class="fas fa-sync"></i> Refresh</button>
  </div>

  <div class="inbox-header" style="padding: 0 20px; margin-bottom: 10px;">
    <div class="inbox-title" style="color:#fff; font-weight:bold;">Inbox <span id="countBadge" class="badge-count">0</span></div>
  </div>

  <div id="inbox" class="messages-area" style="padding: 0 20px 20px 20px;"></div>
</div>

<script>
/* (JS কোডটি আগের মতোই থাকবে, শুধু সচল রাখতে নিচের ফাংশনগুলো নিশ্চিত করা হলো) */
let currentProvider = "guerrilla"; let currentSid = null; let currentEmail = null; let mailtmToken = null;

function showMessage(msg) {
  let toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
  document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500);
}

// [এখানে আপনার আগের JS ফাংশনগুলো (generateWithGuerrilla, generateMail, loadInbox, etc.) একই রকম থাকবে]
// আমি শুধু এখানে মেইন লজিক কলগুলো রেখে দিচ্ছি যেন আপনার প্রজেক্ট কাজ করে
async function generateMail() {
    // এখানে আপনার আগের তৈরি করা generateMail ফাংশনটি বসান
    showMessage('Generating...');
}

// প্রজেক্টের বাকি JS লজিকগুলো এখানে আগের মতোই বসিয়ে দিবেন।
</script>

</body>
</html>
